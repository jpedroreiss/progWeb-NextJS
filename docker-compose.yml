version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tccdb
      POSTGRES_USER: tccuser
      POSTGRES_PASSWORD: tccpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      POSTGRES_DB: tccdb
      POSTGRES_USER: tccuser
      POSTGRES_PASSWORD: tccpass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_SETTINGS_MODULE: tcc_project.settings
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped
    command: >
      sh -c "until pg_isready -h db -p 5432; do echo 'Waiting for Postgres...'; sleep 2; done && python manage.py migrate --noinput && python load.py && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000/api
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
